{% extends 'filemanager/base.html' %}

{% block title %}Delete file - Upload Center{% endblock %}

{% block content %}
<div class="col-lg-6 mx-auto">
    <div class="card border-danger">
        <div class="card-header bg-white border-danger">
            <h1 class="h5 mb-0">Delete file</h1>
        </div>
        <div class="card-body">
            <p class="mb-3">
                Are you sure you want to permanently delete
                <strong>{{ file.title }}</strong>?
            </p>
            <form method="post">
                {% csrf_token %}
                <div class="d-flex justify-content-between">
                    <a href="{% url 'dashboard' %}" class="btn btn-outline-light">Cancel</a>
                    <button type="submit" class="btn btn-danger">Yes, delete it</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
