{% extends 'filemanager/base.html' %}

{% block title %}Reset link sent - Upload Center{% endblock %}

{% block content %}
<div class="col-lg-4 mx-auto">
    <div class="card bg-dark border-secondary">
        <div class="card-header">
            <h1 class="h5 mb-0">Check your inbox</h1>
        </div>
        <div class="card-body">
            <p class="small text-muted mb-3">
                If an account exists with the email you entered, we have sent a password reset link.
            </p>
            <a href="{% url 'login' %}" class="btn btn-outline-light">Back to sign in</a>
        </div>
    </div>
</div>
{% endblock %}
